<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Macro Intelligence Platform</title>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
    padding:30px;
}

.container{
    max-width:1400px;
    margin:auto;
}

.card{
    background:#1e293b;
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
}

.grid{
    display:grid;
    gap:20px;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
}

h1{
    color:#60a5fa;
}

h2{
    margin-top:0;
}

.green{
    color:#22c55e;
}

.red{
    color:#ef4444;
}

.news-card{
    background:#0f172a;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    border-left:4px solid #60a5fa;
}

.news-card h3{
    margin-top:0;
    font-size:18px;
}

.news-card p{
    color:#94a3b8;
}

.news-card a{
    color:#60a5fa;
    text-decoration:none;
    font-weight:bold;
}

.news-card a:hover{
    text-decoration:underline;
}

.metric{
    font-size:38px;
    font-weight:bold;
    margin-top:15px;
}

.section-title{
    margin-bottom:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>📈 Macro Intelligence Platform</h1>

<div id="dashboard">
Chargement...
</div>

</div>

<script>

fetch("./data.json")
.then(response => response.json())
.then(data => {

document.getElementById("dashboard").innerHTML = `

<div class="card">
<h2>📅 Dernière mise à jour</h2>
<p>${data.lastUpdate}</p>
</div>

<div class="grid">

<div class="card">
<h2>🛢️ Brent</h2>
<div class="metric">$${data.commodities.brent.price}</div>
<p class="green">${data.commodities.brent.change}%</p>
</div>

<div class="card">
<h2>🛢️ WTI</h2>
<div class="metric">$${data.commodities.wti.price}</div>
<p class="green">${data.commodities.wti.change}%</p>
</div>

<div class="card">
<h2>🥇 Or</h2>
<div class="metric">$${data.commodities.gold.price}</div>
<p class="green">${data.commodities.gold.change}%</p>
</div>

<div class="card">
<h2>⚠️ Risk Score</h2>
<div class="metric">${data.riskScore.global}</div>
<p>Global Risk</p>
</div>

</div>

<div class="grid">

<div class="card">
<h2>📈 S&P 500</h2>
<div class="metric">${data.markets.sp500.price}</div>
<p class="green">${data.markets.sp500.change}%</p>
</div>

<div class="card">
<h2>📈 Nasdaq</h2>
<div class="metric">${data.markets.nasdaq.price}</div>
<p class="green">${data.markets.nasdaq.change}%</p>
</div>

<div class="card">
<h2>📈 Dow Jones</h2>
<div class="metric">${data.markets.dow.price}</div>
<p class="green">${data.markets.dow.change}%</p>
</div>

</div>

<div class="card">

<h2 class="section-title">🇺🇸 États-Unis</h2>

${(data.usa || []).map(article => `
<div class="news-card">
<h3>${article.title}</h3>

<p>
Source :
${article.source || "Reuters"}
</p>

${article.url}
Lire l'article →
</a>

</div>
`).join("")}

</div>

<div class="card">

<h2 class="section-title">🇨🇳 Chine</h2>

${(data.china || []).map(article => `
<div class="news-card">
<h3>${article.title}</h3>

<p>
Source :
${article.source || "Reuters"}
</p>

<a hrefle.url}
Lire l'article →
</a>

</div>
`).join("")}

</div>

<div class="card">

<h2 class="section-title">🌍 Géopolitique</h2>

${(data.geopolitics || []).map(article => `
<div class="news-card">
<h3>${article.title}</h3>

<aarticle.url}
Lire l'article →
</a>

</div>
`).join("")}

</div>

`;

})
.catch(error => {

document.getElementById("dashboard").innerHTML = `
<div class="card">
<h2>❌ Erreur</h2>
<p>Impossible de charger data.json</p>
</div>
`;

console.error(error);

});

</script>

</body>
</html>
