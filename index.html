<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macro Intelligence Platform</title>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
    padding:30px;
}

.container{
    max-width:1400px;
    margin:auto;
}

.card{
    background:#1e293b;
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

h1{
    color:#60a5fa;
}

a{
    color:#60a5fa;
    text-decoration:none;
}

a:hover{
    text-decoration:underline;
}

.green{
    color:#22c55e;
}

.red{
    color:#ef4444;
}

</style>

</head>

<body>

<div class="container">

<h1>📈 Macro Intelligence Platform</h1>

<div id="dashboard">
Chargement...
</div>

</div>

<script>

fetch("./data.json")
.then(r => r.json())
.then(data => {

document.getElementById("dashboard").innerHTML = `

<div class="card">
<h2>📅 Dernière mise à jour</h2>
<p>${data.lastUpdate}</p>
</div>

<div class="grid">

<div class="card">
<h2>🛢️ Brent</h2>
<h1>$${data.commodities.brent.price}</h1>
<p class="green">${data.commodities.brent.change}%</p>
</div>

<div class="card">
<h2>🛢️ WTI</h2>
<h1>$${data.commodities.wti.price}</h1>
<p class="green">${data.commodities.wti.change}%</p>
</div>

<div class="card">
<h2>🥇 Or</h2>
<h1>$${data.commodities.gold.price}</h1>
<p class="green">${data.commodities.gold.change}%</p>
</div>

<div class="card">
<h2>⚠️ Risk Score</h2>
<h1>${data.riskScore}/10</h1>
</div>

</div>

<div class="grid">

<div class="card">
<h2>📈 S&P 500</h2>
<h1>${data.markets?.sp500?.price || 0}</h1>
<p class="green">${data.markets?.sp500?.change || 0}%</p>
</div>

<div class="card">
<h2>📈 Nasdaq</h2>
<h1>${data.markets?.nasdaq?.price || 0}</h1>
<p class="green">${data.markets?.nasdaq?.change || 0}%</p>
</div>

</div>

<div class="card">
<h2>🇺🇸 États-Unis</h2>

${(data.usa || []).map(item => `
<p>
${item.url}
${item.title}
</a>
</p>
`).join("")}

</div>

<div class="card">
<h2>🇨🇳 Chine</h2>

${(data.china || []).map(item => `
<p>
${item.url}
${item.title}
</a>
</p>
`).join("")}

</div>

<div class="card">
<h2>🌍 Géopolitique</h2>

${(data.geopolitics || []).map(item => `
<p>
<a href="${itemtem.title}
</a>
</p>
`).join("")}

</div>

`;

})
.catch(error => {

document.getElementById("dashboard").innerHTML =
"<h2>Erreur de chargement des données</h2>";

console.error(error);

});

</script>

</body>

</html>
